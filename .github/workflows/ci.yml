name: CI & Release

on:
  push:
    branches: [ master ]
    # تفعيل إنشاء الـ Release عند دفع Tag يبدأ بحرف v (مثل v1.0.0)
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '21 11 * * 5'

jobs:
  linux:
    name: Linux build and release
    runs-on: ubuntu-latest
    
    # منح الصلاحيات اللازمة لإنشاء الـ Release في المستودع
    permissions:
      contents: write 

    steps:
    - uses: actions/checkout@v4

    - name: Update
      run: sudo apt-get update

    # تم إضافة libbz2-dev لحل مشكلة الخطأ الأخير، و zlib1g-dev لضمان توفر الاعتماديات الثابتة
    - name: Dependencies
      run: sudo apt-get install build-essential cmake libboost-all-dev liblzma-dev libbz2-dev zlib1g-dev

    - name: Configure
      # تفعيل البناء المحسن للإنتاج (-DCMAKE_BUILD_TYPE=Release) وتفعيل الربط الثابت (-DUSE_STATIC_LIBS=ON)
      run: cmake --version && cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON -Werror=dev -Werror=deprecated -DCONTINUOUS_INTEGRATION=1

    - name: Build
      run: cmake --build ${{github.workspace}}/build

    - name: Check Style
      run: cmake --build ${{github.workspace}}/build --target style

    # إنشاء مجلد وتجميع الملفات المطلوبة للـ Release (يتم تنفيذه فقط عند دفع Tag)
    - name: Package Release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir -p staging
        cp ${{github.workspace}}/build/innoextract staging/
        tar -czvf innoextract-linux-amd64.tar.gz -C staging innoextract

    # إنشاء الـ Release ورفع الملف المضغوط (يتم تنفيذه فقط عند دفع Tag)
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: innoextract-linux-amd64.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
