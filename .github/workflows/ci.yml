name: CI & Release

on:
  push:
    branches: [ master ]
    # تفعيل إنشاء الـ Release عند دفع Tag يبدأ بحرف v (مثل v1.0.0)
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '21 11 * * 5'

jobs:
  linux:
    name: Linux build and release
#    runs-on: ubuntu-20.04


    # نطلب أسرع وأحدث سيرفر متاح لتجاوز طابور الانتظار
    runs-on: ubuntu-latest

    # نقوم بتشغيل البناء داخل حاوية (Container) بنظام 20.04 لضمان توافقية GLIBC
    container: ubuntu:20.04

    # منح الصلاحيات اللازمة لإنشاء الـ Release في المستودع
    permissions:
      contents: write

    steps:
      # بيئة الحاوية الخام لا تحتوي على Git الأساسي، يجب تثبيته أولاً لسحب الكود
      - name: Install Prerequisites
        run: apt-get update && apt-get install -y git ca-certificates


      - uses: actions/checkout@v4



      - name: Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: apt-get install -y build-essential cmake libboost-all-dev liblzma-dev libbz2-dev zlib1g-dev

      - name: Configure
        run: cmake --version && cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DUSE_STATIC_LIBS=ON -DWITH_CONV=builtin -DCMAKE_EXE_LINKER_FLAGS="-lbz2 -lz"

      - name: Build
        run: cmake --build ${{github.workspace}}/build

      - name: Check Style
        run: cmake --build ${{github.workspace}}/build --target style

      - name: Verify Executable (Smoke Test)
        run: |
          OUTPUT=$(${{github.workspace}}/build/innoextract -h || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Extract files from an Inno Setup installer"; then
            echo "✅ Smoke test passed: Executable is working and help text verified."
          else
            echo "❌ Smoke test failed: Expected help text not found or execution crashed."
            exit 1
          fi

      # إنشاء مجلد وتجميع الملفات المطلوبة للـ Release (يتم تنفيذه فقط عند دفع Tag)
      - name: Package Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p staging
          cp ${{github.workspace}}/build/innoextract staging/
          tar -czvf innoextract-linux-amd64.tar.gz -C staging innoextract

      # إنشاء الـ Release ورفع الملف المضغوط (يتم تنفيذه فقط عند دفع Tag)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: innoextract-linux-amd64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
